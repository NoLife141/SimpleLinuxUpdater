<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SimpleLinuxUpdater - Login</title>
    <link rel="stylesheet" href="/static/css/base.css">
    <link rel="stylesheet" href="/static/css/login.css">
</head>
<body>
    <main class="card">
        <h1>SimpleLinuxUpdater Login</h1>
        <p class="subtle">Sign in to manage servers, updates, and observability.</p>
        <form id="login-form" autocomplete="on">
            <label for="username">Username</label>
            <input id="username" name="username" type="text" required maxlength="64" autocomplete="username">
            <label for="password">Password</label>
            <input id="password" name="password" type="password" required maxlength="64" autocomplete="current-password">
            <button type="submit">Sign in</button>
        </form>
        <div id="error-banner" class="error" role="alert" aria-live="assertive"></div>
    </main>
    <script src="/static/js/common.js"></script>
    <script src="/static/js/login.js"></script>
</body>
</html>
