<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SimpleLinuxUpdater - Login</title>
    <style>
        :root {
            --bg: #0b1220;
            --card: #111a2b;
            --card-alt: #17243b;
            --text: #e7edf7;
            --subtle: #94a3b8;
            --accent: #38bdf8;
            --border: rgba(148, 163, 184, 0.2);
            --shadow: 0 10px 30px rgba(2, 8, 23, 0.35);
            --danger: #f87171;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            color: var(--text);
            background: radial-gradient(1200px 700px at 80% -20%, rgba(56, 189, 248, 0.18), transparent 60%), var(--bg);
            display: grid;
            place-items: center;
            padding: 20px;
        }

        .card {
            width: min(480px, 100%);
            background: linear-gradient(180deg, var(--card-alt), var(--card));
            border: 1px solid var(--border);
            border-radius: 14px;
            box-shadow: var(--shadow);
            padding: 24px;
        }

        h1 {
            margin: 0 0 10px;
            font-size: 28px;
        }

        .subtle {
            margin: 0 0 18px;
            color: var(--subtle);
            font-size: 14px;
        }

        form {
            display: grid;
            gap: 10px;
        }

        label {
            font-size: 13px;
            color: var(--subtle);
            font-weight: 600;
            letter-spacing: 0.03em;
        }

        input, button {
            appearance: none;
            border: 1px solid var(--border);
            background: rgba(15, 23, 42, 0.7);
            color: var(--text);
            border-radius: 10px;
            padding: 10px 12px;
            font-size: 14px;
        }

        input:focus {
            outline: none;
            border-color: rgba(56, 189, 248, 0.55);
            border-color: color-mix(in srgb, var(--accent) 55%, transparent);
            box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.2);
            box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 20%, transparent);
        }

        button {
            cursor: pointer;
            font-weight: 600;
        }

        button:hover {
            border-color: rgba(56, 189, 248, 0.55);
            border-color: color-mix(in srgb, var(--accent) 55%, transparent);
        }

        .error {
            display: none;
            margin-top: 12px;
            border: 1px solid rgba(248, 113, 113, 0.45);
            background: rgba(127, 29, 29, 0.35);
            color: #fecaca;
            border-radius: 10px;
            padding: 10px 12px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <main class="card">
        <h1>SimpleLinuxUpdater Login</h1>
        <p class="subtle">Sign in to manage servers, updates, and observability.</p>
        <form id="login-form" autocomplete="on">
            <label for="username">Username</label>
            <input id="username" name="username" type="text" required maxlength="64" autocomplete="username">
            <label for="password">Password</label>
            <input id="password" name="password" type="password" required maxlength="64" autocomplete="current-password">
            <button type="submit">Sign in</button>
        </form>
        <div id="error-banner" class="error"></div>
    </main>
    <script>
        const form = document.getElementById('login-form');
        const errorBanner = document.getElementById('error-banner');

        function showError(message) {
            errorBanner.textContent = message;
            errorBanner.style.display = 'block';
        }

        async function checkSetupState() {
            try {
                const response = await fetch('/api/auth/status', { cache: 'no-store' });
                if (!response.ok) {
                    return;
                }
                const payload = await response.json();
                if (payload.setup_required) {
                    window.location.href = '/setup';
                    return;
                }
                if (payload.authenticated) {
                    window.location.href = '/';
                }
            } catch (_) {
                // Best effort; user can still submit form.
            }
        }

        form.addEventListener('submit', async (event) => {
            event.preventDefault();
            errorBanner.style.display = 'none';

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;

            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password }),
                });
                if (response.status === 409) {
                    window.location.href = '/setup';
                    return;
                }
                if (!response.ok) {
                    const payload = await response.json().catch(() => ({}));
                    showError(payload.error || 'Login failed.');
                    return;
                }
                window.location.href = '/';
            } catch (error) {
                showError(error?.message || 'Login failed.');
            }
        });

        checkSetupState();
    </script>
</body>
</html>
