<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SimpleLinuxUpdater - Login</title>
    <link rel="icon" type="image/png" href="/static/logo.png">
    <link rel="stylesheet" href="/static/css/base.css?v=vscode-dark-20260521a">
    <link rel="stylesheet" href="/static/css/auth-common.css?v=vscode-dark-20260521a">
</head>
<body>
    <main class="auth-shell">
        <section class="auth-hero fade-in">
            <a class="brand-lockup auth-brand" href="/" aria-label="SimpleLinuxUpdater login">
                <img class="brand-logo" src="/static/logo.png" alt="Linux updates logo">
                <span>
                    <strong>SimpleLinuxUpdater</strong>
                    <small>Fleet update workspace</small>
                </span>
            </a>
            <div class="eyebrow">Secure access</div>
            <h1>Sign in</h1>
            <p class="muted">Manage servers, approvals, scheduled updates, and observability from one dense operations desk.</p>
            <div class="auth-meta">
                <span class="meta-pill live">Protected</span>
                <span class="meta-pill">Local admin</span>
            </div>
        </section>
        <section class="card auth-card fade-in">
            <div class="panel-kicker">Login</div>
            <h2>Welcome back</h2>
            <p class="muted">Use the local admin account created during setup.</p>
            <form id="login-form" method="post" action="/api/auth/login" autocomplete="on">
                <label for="username">Username</label>
                <input id="username" name="username" type="text" required maxlength="64" autocomplete="username">
                <label for="password">Password</label>
                <input id="password" name="password" type="password" required maxlength="64" autocomplete="current-password">
                <button class="primary-action" type="submit">Sign in</button>
            </form>
            <div id="error-banner" class="error" role="alert" aria-live="assertive"></div>
        </section>
    </main>
    <script src="/static/js/common.js"></script>
    <script src="/static/js/login.js"></script>
</body>
</html>
