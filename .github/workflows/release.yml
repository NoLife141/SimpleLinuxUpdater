name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read
  packages: write

jobs:
  release-gate:
    runs-on: ubuntu-latest
    env:
      PLAYWRIGHT_BROWSERS_PATH: ~/.cache/ms-playwright
      PLAYWRIGHT_WEBSERVER_COMMAND: 'mkdir -p .tmp-e2e && rm -f .tmp-e2e/servers.db && : > .tmp-e2e/known_hosts && DEBIAN_UPDATER_DB_PATH=.tmp-e2e/servers.db DEBIAN_UPDATER_KNOWN_HOSTS=.tmp-e2e/known_hosts ./webserver'
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Cache Playwright browser
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}

      - name: Install release tooling
        run: |
          # Pin release-gate tooling so tagged releases are reproducible.
          go install honnef.co/go/tools/cmd/staticcheck@v0.7.0
          go install golang.org/x/vuln/cmd/govulncheck@v1.3.0
          go install github.com/rhysd/actionlint/cmd/actionlint@v1.7.12

      - name: Install UI dependencies
        run: npm ci

      - name: Run tests
        run: |
          go vet ./...
          staticcheck ./...
          govulncheck ./...
          actionlint
          go test -count=1 ./...
          go test -race -count=1 ./...
          go test -covermode=atomic -coverprofile=coverage.out ./...
          go build -o webserver .
          npm audit --audit-level=moderate
          npx playwright install --with-deps chromium
          npm run test:e2e

      - name: Verify release metadata
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF#refs/tags/}"
          echo "Tag: $TAG"
          echo "$TAG" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+$'
          grep -q "^Version: $TAG$" README.md
          grep -Eq ">[[:space:]]*${TAG}[[:space:]]*<" templates/index.html
          test -f CHANGELOG.md
          grep -q "^## \[$TAG\]" CHANGELOG.md

  publish-release:
    needs: release-gate
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Build release archives
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          APP="SimpleLinuxUpdater_${VERSION}"
          mkdir -p dist

          for TARGET in "linux amd64" "linux arm64" "darwin amd64" "darwin arm64" "windows amd64"; do
            GOOS="${TARGET%% *}"
            GOARCH="${TARGET##* }"
            EXT=""
            if [ "$GOOS" = "windows" ]; then
              EXT=".exe"
            fi

            BIN="webserver_${GOOS}_${GOARCH}${EXT}"
            PKG_DIR="dist/${APP}_${GOOS}_${GOARCH}"
            PKG_ROOT="${PKG_DIR}/${APP}"

            CGO_ENABLED=0 GOOS="$GOOS" GOARCH="$GOARCH" go build -trimpath -ldflags="-s -w" -o "dist/${BIN}" .

            mkdir -p "$PKG_ROOT"
            cp "dist/${BIN}" "${PKG_ROOT}/webserver${EXT}"
            cp -r templates static docs "$PKG_ROOT/"
            if [ -d .github/assets ]; then
              mkdir -p "$PKG_ROOT/.github"
              cp -r .github/assets "$PKG_ROOT/.github/"
            fi
            cp README.md LICENSE .env-template "$PKG_ROOT/"

            if [ "$GOOS" = "windows" ]; then
              (
                cd "$PKG_DIR"
                zip -qr "../${APP}_${GOOS}_${GOARCH}.zip" "$APP"
              )
            else
              tar -C "$PKG_DIR" -czf "dist/${APP}_${GOOS}_${GOARCH}.tar.gz" "$APP"
            fi
            rm -rf "$PKG_DIR" "dist/${BIN}"
          done

          (
            cd dist
            sha256sum *.tar.gz *.zip > checksums.txt
          )

      - name: Build release notes from CHANGELOG
        id: release_notes
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF#refs/tags/}"
          NOTES_FILE="dist/release_notes.md"
          awk -v tag="$TAG" '
            $0 ~ "^## \\[" tag "\\]" {capture=1}
            capture && $0 ~ "^## \\[" && $0 !~ "^## \\[" tag "\\]" {exit}
            capture {print}
          ' CHANGELOG.md > "$NOTES_FILE"
          if [ ! -s "$NOTES_FILE" ]; then
            echo "Failed to extract release notes for $TAG from CHANGELOG.md" >&2
            exit 1
          fi
          echo "path=$NOTES_FILE" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          body_path: ${{ steps.release_notes.outputs.path }}
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/checksums.txt

  publish-docker:
    needs: [release-gate, publish-release]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Compute image name
        id: image
        run: |
          set -euo pipefail
          OWNER_LC="$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')"
          REPO_LC="$(echo "${{ github.event.repository.name }}" | tr '[:upper:]' '[:lower:]')"
          echo "name=ghcr.io/${OWNER_LC}/${REPO_LC}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=ref,event=tag
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
